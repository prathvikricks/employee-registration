<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Employee Registration</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container">
      <section class="card">
        <p class="eyebrow">Human resources</p>
        <h1>Register employee</h1>
        <p class="intro">Add a new employee to the company directory.</p>
        <form id="employee-form">
          <div class="grid">
            <label>First name<input name="firstName" required maxlength="80" /></label>
            <label>Last name<input name="lastName" required maxlength="80" /></label>
            <label>Email<input name="email" type="email" required maxlength="255" /></label>
            <label>Department<input name="department" required maxlength="100" placeholder="e.g. Engineering" /></label>
            <label class="full">Job title<input name="jobTitle" required maxlength="100" placeholder="e.g. Software Engineer" /></label>
          </div>
          <button type="submit">Register employee</button>
          <p id="message" role="status"></p>
        </form>
      </section>
      <section class="card">
        <div class="heading-row"><div><p class="eyebrow">Directory</p><h2>Employees</h2></div><span id="count"></span></div>
        <div class="table-wrap"><table><thead><tr><th>Name</th><th>Email</th><th>Department</th><th>Job title</th></tr></thead><tbody id="employee-list"></tbody></table></div>
      </section>
    </main>
    <script src="app.js"></script>
  </body>
</html>
